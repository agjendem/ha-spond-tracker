blueprint:
  name: "Spond: notify on event cancellation"
  description: >
    Send a notification when Spond Tracker fires a
    `spond_event_cancelled` event for the chosen tracked member. The
    notification carries a `tag` derived from the event UID so a
    re-emitted cancellation replaces the previous one on the device.
  domain: automation
  source_url: https://github.com/agjendem/ha-spond-tracker/blob/main/blueprints/automation/spond_event_cancelled.yaml
  input:
    member:
      name: Tracked member
      description: >
        The `canonical` slug from your `apps.yaml` (lowercase first
        name — e.g. `alice`).
      selector:
        text: {}
    notify_target:
      name: Notification target
      selector:
        entity:
          domain: notify
    notification_title:
      name: Notification title
      default: "🚫 Spond event cancelled"
      selector:
        text: {}
    notification_message:
      name: Notification message
      description: >
        Jinja template. Available variables: `trigger.event.data.title`,
        `.start`, `.location`, `.uid`.
      default: |-
        {% set dt = trigger.event.data.start | as_datetime | as_local %}
        {{ trigger.event.data.title }} ({{ dt.strftime('%a %d.%m at %H:%M') }}){% if trigger.event.data.location %} at {{ trigger.event.data.location }}{% endif %}
      selector:
        text:
          multiline: true

mode: single

trigger:
  - platform: event
    event_type: spond_event_cancelled
    event_data:
      member: !input member

action:
  - service: notify.send_message
    target:
      entity_id: !input notify_target
    data:
      title: !input notification_title
      message: !input notification_message
      data:
        tag: "spond_cancel_{{ trigger.event.data.uid }}"
        group: "Spond"
