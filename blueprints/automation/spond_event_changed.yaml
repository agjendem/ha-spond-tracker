blueprint:
  name: "Spond: notify on event change"
  description: >
    Send a notification when Spond Tracker fires a
    `spond_event_changed` event AND at least one of the configured
    fields actually changed. Without the field filter, every poll-over-
    poll diff (e.g. RSVP changes) would notify — usually too noisy.

    The default field set covers the changes that affect attendance
    planning: start time, end time, location, and event title.
  domain: automation
  source_url: https://github.com/agjendem/ha-spond-tracker/blob/main/blueprints/automation/spond_event_changed.yaml
  input:
    member:
      name: Tracked member
      description: >
        The `canonical` slug from your `apps.yaml` (lowercase first
        name — e.g. `alice`).
      selector:
        text: {}
    notify_target:
      name: Notification target
      selector:
        entity:
          domain: notify
    relevant_fields:
      name: Fields to notify on
      description: >
        Only fire when one of these fields appears in
        `trigger.event.data.changed_fields`. Status changes alone are
        usually noise; uncheck if you don't want them.
      default:
        - start
        - end
        - location
        - title
      selector:
        select:
          multiple: true
          options:
            - start
            - end
            - location
            - title
            - status
    notification_title:
      name: Notification title
      default: "📅 Spond event changed"
      selector:
        text: {}
    notification_message:
      name: Notification message
      description: >
        Jinja template. Available variables: `trigger.event.data.title`,
        `.start`, `.changed_fields`, `.uid`, and the input variable
        `relevant_fields`.
      default: |-
        {% set dt = trigger.event.data.start | as_datetime | as_local %}
        {{ trigger.event.data.title }} ({{ dt.strftime('%a %d.%m at %H:%M') }})
        Changed: {{ trigger.event.data.changed_fields | select('in', relevant_fields) | list | join(', ') }}
      selector:
        text:
          multiline: true

mode: single

variables:
  relevant_fields: !input relevant_fields

trigger:
  - platform: event
    event_type: spond_event_changed
    event_data:
      member: !input member

condition:
  - condition: template
    value_template: >-
      {{ trigger.event.data.changed_fields | select('in', relevant_fields) | list | count > 0 }}

action:
  - service: notify.send_message
    target:
      entity_id: !input notify_target
    data:
      title: !input notification_title
      message: !input notification_message
      data:
        tag: "spond_change_{{ trigger.event.data.uid }}"
        group: "Spond"
