# Example AppDaemon apps.yaml entry for spond_tracker.
#
# Copy the `spond_tracker:` block into your actual apps.yaml
# (typically /config/appdaemon/apps/apps.yaml) and adjust to your setup.
#
# IMPORTANT:
#   - Username/password should be referenced via !secret, never inlined.
#   - apps.yaml itself must NEVER be committed to a public repo —
#     it identifies your Spond accounts and tracked members.
#
---
spond_tracker:
  module: spond_tracker
  class: SpondTracker

  # Language for user-facing strings in calendar entries and sensor
  # friendly_name. Supported: en (default), nb (Norwegian Bokmål).
  # The legacy code `no` is accepted as an alias for `nb`. Log messages
  # are always English.
  language: en

  # IANA timezone for "today" cutoffs and the poll schedule. Default
  # Europe/Oslo. An invalid name logs a WARNING and falls back to the
  # default at startup. Keep this in sync with `time_zone` in the
  # AppDaemon add-on's `appdaemon.yaml`.
  timezone: Europe/Oslo

  # One entry per Spond account you log in with. The app aggregates events
  # from all accounts and de-duplicates per tracked member, so it is safe
  # for multiple accounts to have overlapping group visibility.
  accounts:
    - name: AccountA
      username: !secret spond_account_a_username
      password: !secret spond_account_a_password
    - name: AccountB
      username: !secret spond_account_b_username
      password: !secret spond_account_b_password

  # One entry per member you want to track.
  # `canonical`     = lowercase first name. The app matches this to the first
  #                   word of the Spond `firstName` field on memberships your
  #                   accounts can respond on-behalf-of. Must be unique.
  # `display_name`  = used in sensor friendly names.
  # `config_entry_id` = the config-entry ID of a `local_calendar` integration
  #                     instance dedicated to this member. Find it under
  #                     Settings -> Devices & Services -> Local Calendar ->
  #                     three dots -> click the calendar -> URL bar.
  members:
    - canonical: alice
      display_name: Alice
      config_entry_id: 01HXXXXXXXXXXXXXXXXXXXXXXX
    - canonical: bob
      display_name: Bob
      config_entry_id: 01HYYYYYYYYYYYYYYYYYYYYYYY
